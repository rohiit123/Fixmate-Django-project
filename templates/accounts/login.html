{% extends 'base.html' %}

{% block title %}
Login | FixMate
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-5">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body p-5">

                    <h2 class="text-center fw-bold mb-4">
                        Login
                    </h2>

                    <form method="POST">

                        {% csrf_token %}

                        {% for field in form %}

                        <div class="mb-3">

                            <label class="form-label">

                                {{ field.label }}

                            </label>

                            {{ field }}

                            {% if field.errors %}
                                <div class="text-danger small">
                                    {{ field.errors }}
                                </div>
                            {% endif %}

                        </div>

                        {% endfor %}

                        <button class="btn btn-primary w-100">

                            Login

                        </button>

                    </form>

                    <hr>

                    <p class="text-center">

                        Don't have an account?

                        <a href="{% url 'register' %}">

                            Register

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
